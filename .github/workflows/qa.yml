name: Visual Regression & Accessibility

on:
  # Run on every push to main (pre-deployment gate)
  push:
    branches: [main]
  # Run on-demand from the Actions tab
  workflow_dispatch:

jobs:
  qa:
    name: QA — Visual + A11y
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true   # pull committed baseline PNGs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run build:storybook

      - name: Serve Storybook (background)
        run: npx serve storybook-static --listen 6006 --no-clipboard &

      - name: Wait for Storybook to be ready
        run: timeout 60 sh -c 'until curl -sf http://localhost:6006 > /dev/null; do sleep 2; done'

      - name: Run visual regression + accessibility tests
        run: npm run test:qa

      - name: Upload visual diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-report-${{ github.sha }}
          path: |
            reports/visual.html
            reports/visual/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report-${{ github.sha }}
          path: reports/a11y.html
          retention-days: 30
          if-no-files-found: ignore
