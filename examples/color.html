<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A1 Color Demo</title>
    <link rel="stylesheet" href="./shared.css">
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Color</h1>
        <p class="lede">
          Rendered from <span class="path">system/tokens/color-ramp.json</span>.
        </p>
      </header>

      <section class="layer-stack" id="demo"></section>
    </main>

    <script type="module">
      const sourcePath = "../system/tokens/color-ramp.json";
      const stepOrder = [
        "0",
        "50",
        "100",
        "200",
        "300",
        "400",
        "500",
        "600",
        "700",
        "800",
        "900",
        "1000"
      ];

      const demo = document.querySelector("#demo");

      function getPath(object, path) {
        return path.split(".").reduce((current, key) => current?.[key], object);
      }

      function resolveValue(tokens, value) {
        const reference = typeof value === "string"
          ? value.match(/^\{(.+)\}$/)
          : null;

        if (!reference) return value;

        const token = getPath(tokens, reference[1]);
        return resolveValue(tokens, token?.$value);
      }

      function resolveRamp(tokens, ramp) {
        return Object.fromEntries(
          stepOrder.map(step => [step, resolveValue(tokens, ramp[step]?.$value)])
        );
      }

      function readableText(hex) {
        const value = hex.replace("#", "");
        const r = parseInt(value.slice(0, 2), 16);
        const g = parseInt(value.slice(2, 4), 16);
        const b = parseInt(value.slice(4, 6), 16);
        const yiq = (r * 299 + g * 587 + b * 114) / 1000;
        return yiq >= 150 ? "#151821" : "#ffffff";
      }

      function renderRamp(title, path, ramp) {
        return `
          <article class="layer">
            <div class="layer-heading">
              <h2>${title}</h2>
              <span class="path">${path}</span>
            </div>
            <div class="ramp">
              ${stepOrder.map(step => `
                <div
                  class="swatch"
                  style="--swatch-color: ${ramp[step]}; --swatch-text: ${readableText(ramp[step])};"
                >
                  <span class="step">${step}</span>
                  <span class="value">${ramp[step]}</span>
                </div>
              `).join("")}
            </div>
          </article>
        `;
      }

      function renderTokenGrid(title, path, tokens, source) {
        const entries = flattenTokenEntries(tokens);

        return `
          <article class="layer">
            <div class="layer-heading">
              <h2>${title}</h2>
              <span class="path">${path}</span>
            </div>
            <div class="token-grid">
              ${entries.map(([name, token]) => {
                const color = resolveValue(source, token.$value);

                return `
                  <div class="token">
                    <span class="token-chip" style="--swatch-color: ${color};"></span>
                    <span>
                      <span class="token-name">${name}</span>
                      <span class="token-value">${color}</span>
                    </span>
                  </div>
                `;
              }).join("")}
            </div>
          </article>
        `;
      }

      function flattenTokenEntries(tokens, prefix = "") {
        return Object.entries(tokens).flatMap(([name, value]) => {
          const path = prefix ? `${prefix}.${name}` : name;

          if (value?.$value) {
            return [[path, value]];
          }

          return flattenTokenEntries(value, path);
        });
      }

      function renderButtonPreview(tokens) {
        const button = tokens.theme.a1Light.button.primary;
        const background = resolveValue(tokens, button.background.$value);
        const hover = resolveValue(tokens, button.backgroundHover.$value);
        const pressed = resolveValue(tokens, button.backgroundPressed.$value);
        const foreground = resolveValue(tokens, button.foreground.$value);
        const border = resolveValue(tokens, button.border.$value);

        return `
          <article class="layer">
            <div class="layer-heading">
              <h2>Theme Output</h2>
              <span class="path">theme.a1Light.button.primary</span>
            </div>
            <div
              class="button-preview"
              style="
                --button-background: ${background};
                --button-hover: ${hover};
                --button-pressed: ${pressed};
                --button-foreground: ${foreground};
                --button-border: ${border};
              "
            >
              <button class="demo-button" type="button">Primary</button>
              <button class="demo-button hover" type="button">Hover</button>
              <button class="demo-button pressed" type="button">Pressed</button>
            </div>
          </article>
        `;
      }

      async function render() {
        try {
          const response = await fetch(sourcePath);

          if (!response.ok) {
            throw new Error(`Could not load ${sourcePath}`);
          }

          const tokens = await response.json();
          const baseRamps = Object.entries(tokens.base.color).map(([name, ramp]) =>
            renderRamp(
              `${name[0].toUpperCase()}${name.slice(1)} Ramp`,
              `base.color.${name}`,
              resolveRamp(tokens, ramp)
            )
          );

          demo.innerHTML = [
            ...baseRamps,
            renderTokenGrid(
              "Semantic Color",
              "semantic.color",
              tokens.semantic.color,
              tokens
            ),
            renderTokenGrid(
              "Component Color",
              "component.button.primary",
              tokens.component.button.primary,
              tokens
            ),
            renderTokenGrid(
              "Brand Color",
              "brand.a1.color",
              tokens.brand.a1.color,
              tokens
            ),
            renderTokenGrid(
              "Theme Color Output",
              "theme.a1Light.color",
              tokens.theme.a1Light.color,
              tokens
            ),
            renderButtonPreview(tokens)
          ].join("");
        } catch (error) {
          demo.innerHTML = `<p class="error">${error.message}</p>`;
        }
      }

      render();
    </script>
  </body>
</html>
