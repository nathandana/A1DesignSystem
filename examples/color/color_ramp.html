<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A1 Color Ramp Demo</title>
    <script type="importmap">
      {
        "imports": {
          "culori": "../../node_modules/culori/bundled/culori.min.mjs"
        }
      }
    </script>
    <link rel="stylesheet" href="../shared.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>A1 Color Ramp</h1>
          <p class="subtitle">
            OKLCH ramps generated from source colors with Culori gamut clamping.
          </p>
        </div>
      </header>

      <section class="controls" aria-label="Color ramp controls">
        <label>
          Source color
          <input id="hexInput" type="text" value="#3366ff" spellcheck="false">
        </label>
        <label>
          Picker
          <input id="colorInput" type="color" value="#3366ff">
        </label>
        <button class="button" id="addButton" type="button">Add ramp</button>
      </section>

      <p class="error" id="error" role="status" aria-live="polite"></p>

      <section class="preset-row" id="presets" aria-label="Preset colors"></section>

      <section class="grid" id="ramps" aria-label="Generated ramps"></section>

      <section class="output" aria-label="Theme JSON">
        <div class="output-header">
          <h2>Theme JSON</h2>
          <button class="button" id="copyButton" type="button">Copy JSON</button>
        </div>
        <pre><code id="jsonOutput"></code></pre>
      </section>
    </main>

    <script type="module">
      import { generateRamp, generateTheme } from "./generateColorRamp.js";

      const sourceColors = {
        brand: "#3366ff",
        accent: "#00a87e",
        warning: "#df8a00",
        danger: "#d73745"
      };

      const hexInput = document.querySelector("#hexInput");
      const colorInput = document.querySelector("#colorInput");
      const addButton = document.querySelector("#addButton");
      const copyButton = document.querySelector("#copyButton");
      const presets = document.querySelector("#presets");
      const ramps = document.querySelector("#ramps");
      const jsonOutput = document.querySelector("#jsonOutput");
      const error = document.querySelector("#error");

      const stepOrder = [
        "0",
        "50",
        "100",
        "200",
        "300",
        "400",
        "500",
        "600",
        "700",
        "800",
        "900",
        "1000"
      ];

      function readableText(hex) {
        const value = hex.replace("#", "");
        const r = parseInt(value.slice(0, 2), 16);
        const g = parseInt(value.slice(2, 4), 16);
        const b = parseInt(value.slice(4, 6), 16);
        const yiq = (r * 299 + g * 587 + b * 114) / 1000;
        return yiq >= 150 ? "#17191f" : "#ffffff";
      }

      function normalizeHex(value) {
        const trimmed = value.trim();
        const match = trimmed.match(/^#?([0-9a-f]{3}|[0-9a-f]{6})$/i);

        if (!match) return null;

        const raw = match[1];
        const expanded = raw.length === 3
          ? raw.split("").map(character => character + character).join("")
          : raw;

        return `#${expanded.toLowerCase()}`;
      }

      function addSourceColor(hex) {
        const key = `custom${Object.keys(sourceColors).length + 1}`;
        sourceColors[key] = hex;
      }

      function renderPresets() {
        presets.innerHTML = "";

        Object.entries(sourceColors).forEach(([name, hex]) => {
          const button = document.createElement("button");
          button.className = "preset";
          button.type = "button";
          button.innerHTML = `
            <span class="preset-swatch" style="background: ${hex}"></span>
            <span>${name}</span>
          `;
          button.addEventListener("click", () => {
            hexInput.value = hex;
            colorInput.value = hex;
          });
          presets.append(button);
        });
      }

      function renderRamp(name, hex) {
        const ramp = generateRamp(hex);
        const section = document.createElement("article");
        section.className = "layer";
        section.innerHTML = `
          <div class="ramp-header">
            <div class="ramp-title">
              <span class="root-dot" style="background: ${hex}"></span>
              <div>
                <h2>${name}</h2>
                <div class="root-value">${hex}</div>
              </div>
            </div>
          </div>
          <div class="swatches">
            ${stepOrder.map(step => `
              <div
                class="swatch"
                style="--swatch-color: ${ramp[step]}; --swatch-text: ${readableText(ramp[step])};"
              >
                <span class="step">${step}</span>
                <span class="hex">${ramp[step]}</span>
              </div>
            `).join("")}
          </div>
        `;
        return section;
      }

      function render() {
        ramps.innerHTML = "";
        renderPresets();

        Object.entries(sourceColors).forEach(([name, hex]) => {
          ramps.append(renderRamp(name, hex));
        });

        jsonOutput.textContent = JSON.stringify(generateTheme(sourceColors), null, 2);
      }

      function syncInputs(hex) {
        hexInput.value = hex;
        colorInput.value = hex;
      }

      colorInput.addEventListener("input", event => {
        syncInputs(event.target.value);
      });

      hexInput.addEventListener("input", event => {
        const hex = normalizeHex(event.target.value);

        if (hex) {
          colorInput.value = hex;
          error.textContent = "";
        }
      });

      addButton.addEventListener("click", () => {
        const hex = normalizeHex(hexInput.value);

        if (!hex) {
          error.textContent = "Enter a valid hex color.";
          return;
        }

        error.textContent = "";
        syncInputs(hex);
        addSourceColor(hex);
        render();
      });

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(jsonOutput.textContent);
        copyButton.textContent = "Copied";
        window.setTimeout(() => {
          copyButton.textContent = "Copy JSON";
        }, 1200);
      });

      render();
    </script>
  </body>
</html>
